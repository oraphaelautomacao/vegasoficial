<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gallery.css">
    <title>Vegas Gallery</title>
</head>
<body>
    <section id="gallery" class="gallery section">
      <div class="container">
        <h2>Galeria</h2>

        <div class="gallery-grid">
          <img src="img/gallery/1.webp" alt="Ambiente do bar" loading="lazy" />
          <img src="img/gallery/2.webp" alt="Drinks especiais" loading="lazy" />
          <img src="img/gallery/3.webp" alt="Balcão do bar" loading="lazy" />
          <img src="img/gallery/4.webp" alt="Noite no Vega's" loading="lazy" />
          <img
            src="img/gallery/5.webp"
            alt="Detalhes do ambiente"
            loading="lazy"
          />
          <img src="img/gallery/6.webp" alt="Eventos e música" loading="lazy" />
        </div>
      </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox">
      <span class="lightbox-close">&times;</span>
      <img class="lightbox-img" src="" alt="Imagem ampliada" />
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
