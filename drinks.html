<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="drinks.css">
    <title>Vegas Drinks</title>
  </head>
  <body>
    <section id="drinks" class="section container">
      <h2>Nossos Drinks Populares</h2>

      <div class="drink-list">
        <article class="drink-card">
          <img src="img/drinks/gin.webp" alt="Gin Tônica" loading="lazy" />
          <div class="drink-info">
            <h3>Gin Tônica</h3>
            <span class="price">R$ 28,00</span>
          </div>
        </article>

        <article class="drink-card">
          <img src="img/drinks/whisky.webp" alt="Whisky" loading="lazy" />
          <div class="drink-info">
            <h3>Whisky</h3>
            <span class="price">R$ 35,00</span>
          </div>
        </article>

        <article class="drink-card">
          <img
            src="img/drinks/beer.webp"
            alt="Cerveja Artesanal"
            loading="lazy"
          />
          <div class="drink-info">
            <h3>Cerveja Artesanal</h3>
            <span class="price">R$ 18,00</span>
          </div>
        </article>
      </div>
    </section>
    <script src="./js/script.js"></script>
  </body>
</html>
